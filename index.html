<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>json-string-array</title>
</head>

<body>
  <main class="container">
    <header>
      <h1>JSON String Array</h1>
      <p class="subtitle">Split, process, and search JSON arrays</p>
    </header>

    <div class="columns">
      <form id="app" autocomplete="off" class="column-left">
        <div class="input-group">
          <label for="fileInput" class="file-label">
            <span>Upload .txt file</span>
            <input type="file" id="fileInput" accept=".txt">
          </label>
        </div>

        <div class="input-group">
          <label for="textareaInput">Input JSON</label>
          <textarea id="textareaInput" rows="8"
            placeholder='Enter a JSON array, e.g. ["string1","string2"]'
            maxlength="100000"></textarea>
        </div>

        <div class="actions">
          <button type="button" id="processBtn" class="btn btn-primary">Process</button>
        </div>

        <div class="input-group">
          <label for="textareaOutput">Output</label>
          <textarea disabled id="textareaOutput" rows="8"
            placeholder="Processed output will appear here"></textarea>
        </div>

        <div class="actions">
          <button type="button" id="copyBtn" class="btn btn-secondary">Copy Output</button>
        </div>
      </form>

      <div class="column-right">
        <div class="controls">
          <div class="control-group">
            <label for="separatorInput">Separator</label>
            <input id="separatorInput" value="=" autocomplete="off">
          </div>
          <div class="control-group">
            <label for="searchInput">Search</label>
            <input id="searchInput" placeholder="Filter results..." autocomplete="off">
          </div>
        </div>

        <div id="valueDisplayContainer"></div>
      </div>
    </div>

    <footer>
      <small>All processing happens locally in your browser. No data is sent anywhere.</small>
    </footer>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
