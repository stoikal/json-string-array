<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta http-equiv="Content-Security-Policy" content="default-src 'self';script-src 'self';style-src 'unsafe-inline'"><title>JSON String Array</title><style>.container{display:flex;gap:2rem}#keyValueContainer table{border-collapse:collapse;margin-top:.5rem}#keyValueContainer th,#keyValueContainer td{border:1px solid #ccc;padding:.3rem .5rem;text-align:left;font-family:monospace}#keyValueContainer th{background:#f0f0f0}#keyValueContainer .copy-btn{cursor:pointer;margin-left:.3rem;font-size:.8em}</style></head><body><main class="container"><form id="app"><input type="file" id="fileInput" accept=".txt"><br><textarea id="input" rows="10" cols="50" placeholder='Enter a JSON array, e.g. ["string1","string2"]' maxlength="100000"></textarea><br><button type="button" id="processBtn">Process</button><br><br><textarea disabled id="output" rows="10" cols="50" placeholder="Processed output will appear here"></textarea><br><button type="button" id="copyBtn">Copy</button></form><div><label>Separator <input id="separatorInput" value="="></label><br><label>Search <input id="searchInput"></label><br><div id="keyValueContainer"></div></div></main><footer><small>All processing happens locally in your browser. No data is sent anywhere.</small></footer><script src="app.js" defer></script></body></html>
