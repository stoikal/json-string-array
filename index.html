<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>json-string-array</title>
</head>

<body>
  <main class="container">
    <form id="app" autocomplete="off">
      <input type="file" id="fileInput" accept=".txt"><br>
      <textarea id="textareaInput" rows="10" cols="50" placeholder='Enter a JSON array, e.g. ["string1","string2"]'
        maxlength="100000"></textarea><br>
      <button type="button" id="processBtn">Process</button><br><br>

      <textarea disabled id="textareaOutput" rows="10" cols="50" placeholder="Processed output will appear here"></textarea><br>
      <button type="button" id="copyBtn">Copy</button>
    </form>
    <div>
      <label>
        Separator
        <input id="separatorInput" value="=">
      </label>
      <br>
      <label>
        Search
        <input id="searchInput">
      </label>
      <br>

      <div id="valueDisplayContainer"></div>
    </div>
  </main>
  <footer><small>All processing happens locally in your browser. No data is sent anywhere.</small></footer>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
