<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'">
    <title>JSON String Array</title>
</head>
<body>
    <form id="app">
        <input type="file" id="fileInput" accept=".txt"><br>
        <textarea id="input" rows="10" cols="50" placeholder='Enter a JSON array, e.g. ["string1","string2"]' maxlength="100000"></textarea><br>
        <button type="button" id="processBtn">Process</button><br>
        <textarea disabled id="output" rows="10" cols="50" placeholder="Processed output will appear here"></textarea><br>
        <button type="button" id="copyBtn">Copy</button>
    </form>

    <p><small>All processing happens locally in your browser. No data is sent anywhere.</small></p>
    <script src="app.js" defer></script>
</body>
</html>
